trigger:
 - main

pool: may-pool
stages:
  - stage: FirstStage
    displayName: Init
    jobs:
        - job: terraforminit
          steps:
            - task: TerraformTask@5
              inputs:
               provider: 'azurerm'
               command: 'init'
               backendServiceArm: 'may-sc'
               backendAzureRmStorageAccountName: 'maystg12'
               backendAzureRmContainerName: 'maycnt12'
               backendAzureRmKey: 'may.tfstae'