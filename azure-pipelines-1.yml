trigger: none

pool: may-pool

# For Linting

stages:
  - stage: Lint
    displayName: Lint process
    jobs:
      - job: terraformlint
        steps:
          - task: Bash@3
            inputs:
              targetType: 'inline'
              script: |
                # Write your commands here
                curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
                export PATH=$PATH:$PWD
                tflint --init
                tflint

  # For Terraform Init

  - stage: Init
    displayName: Terraform Init
    dependsOn: Lint
    jobs:
      - job: terraforminit
        steps:
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'may-sc'
              backendAzureRmStorageAccountName: 'maystg12'
              backendAzureRmContainerName: 'maycnt12'
              backendAzureRmKey: 'may.tfstate'

  # For Terraform Validate

  - stage: Validate
    displayName: Terraform Validate
    dependsOn: Init
    jobs:
      - job: terraformvalidate
        steps:
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'may-sc'
              backendAzureRmStorageAccountName: 'maystg12'
              backendAzureRmContainerName: 'maycnt12'
              backendAzureRmKey: 'may.tfstate'

          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'validate'

 # For securityScan

  - stage: SecurityScan
    displayName: Checkov Security Scan
    dependsOn: Validate
    jobs:
      - job: checkovjob
        steps:
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'may-sc'
              backendAzureRmStorageAccountName: 'maystg12'
              backendAzureRmContainerName: 'maycnt12'
              backendAzureRmKey: 'may.tfstate'

          - task: Bash@3
            inputs:
              targetType: 'inline'
              script: |
                # Write your commands here
                
                python -m pip install checkov
                checkov -d

  # For Terraform Plan
  - stage: TerraformPlan
    displayName: Plan
    dependsOn: SecurityScan
    jobs:
      - job: terraformplan
        steps:
           - task: TerraformTask@5
             inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'may-sc'
              backendAzureRmStorageAccountName: 'maystg12'
              backendAzureRmContainerName: 'maycnt12'
              backendAzureRmKey: 'may.tfstate'

           - task: TerraformTask@5
             inputs:
               provider: 'azurerm'
               command: 'plan'
               environmentServiceNameAzureRM: 'may-sc'

  # For Terraform apply
  - stage: TerraformApply
    displayName: Apply
    dependsOn: TerraformPlan
    jobs:
      - job: terraformapply
        steps:
           - task: TerraformTask@5
             inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'may-sc'
              backendAzureRmStorageAccountName: 'maystg12'
              backendAzureRmContainerName: 'maycnt12'
              backendAzureRmKey: 'may.tfstate'

           - task: TerraformTask@5
             inputs:
               provider: 'azurerm'
               command: 'apply'
               environmentServiceNameAzureRM: 'may-sc'
